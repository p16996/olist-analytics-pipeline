version: 2
models:
- name: mart_orders
  description: Final orders mart combining order details, customer info, payments,
    and delivery performance.
  columns:
  - name: order_id
    description: Unique identifier for each order placed on the platform.
    tests:
    - unique
    - not_null
  - name: customer_unique_id
    description: Unique identifier representing a distinct customer across multiple
      orders.
  - name: order_status
    description: Current status of the order, e.g. delivered, cancelled, shipped.
  - name: delivery_days
    description: Number of days between order shipment and actual customer delivery.
  - name: delivery_status
    description: 'Derived delivery performance label: On Time, Delayed, or Not Delivered.'
    tests:
    - not_null
    - accepted_values:
        arguments:
          values:
          - On Time
          - Delayed
          - Not Delivered
  - name: total_payment_amount
    description: Total monetary value paid by the customer for the order.
- name: mart_revenue
  description: Monthly revenue aggregated by product category, combining order items
    and order data.
  columns:
  - name: revenue_month
    description: First day of the month when orders were placed, truncated to month.
    tests:
    - not_null
  - name: category_name_english
    description: English name of the product category for the sold items.
  - name: total_item_revenue
    description: Sum of item prices for the category in the given month.
  - name: total_freight_revenue
    description: Sum of freight charges for the category in the given month.
  - name: total_revenue
    description: Combined sum of item prices and freight charges for the month.
    tests:
    - not_null
  - name: order_count
    description: Count of distinct orders containing items from the category that
      month.
- name: mart_seller_performance
  description: Aggregates seller performance metrics including revenue, delivery speed,
    and customer review scores.
  columns:
  - name: seller_id
    description: Unique identifier for the seller, sourced from order items data.
    tests:
    - unique
    - not_null
  - name: seller_city
    description: City where the seller is located.
  - name: seller_state
    description: State abbreviation where the seller is located.
  - name: total_orders
    description: Count of distinct orders fulfilled by the seller.
    tests:
    - not_null
  - name: total_revenue
    description: Total revenue generated by the seller, rounded to two decimals.
  - name: avg_delivery_days
    description: Average number of days to deliver orders, rounded to one decimal.
  - name: avg_review_score
    description: Average customer review score across all seller orders, rounded to
      two decimals.
- name: mart_seller_value_score
  description: Ranks sellers competing on the same product by price, delivery speed,
    and review quality.
  columns:
  - name: product_id
    description: Unique identifier for the product sold by multiple sellers.
  - name: seller_id
    description: Unique identifier for the seller fulfilling the product orders.
  - name: seller_city
    description: City where the seller is located.
  - name: seller_state
    description: Brazilian state abbreviation where the seller operates.
  - name: category_name_english
    description: English product category name the product belongs to.
  - name: avg_price
    description: Seller's average item price for this product, rounded to two decimals.
  - name: order_count
    description: Number of distinct orders fulfilled by this seller for this product.
  - name: avg_delivery_days
    description: Seller's average delivery duration in days for this product.
  - name: avg_review_score
    description: Seller's average customer review score for this product's orders.
  - name: delayed_orders
    description: Count of orders delivered after the estimated delivery date.
  - name: on_time_orders
    description: Count of orders delivered on or before the estimated delivery date.
  - name: seller_count
    description: Total number of distinct sellers offering this product.
  - name: min_price
    description: Lowest price charged for this product across all competing sellers.
  - name: max_price
    description: Highest price charged for this product across all competing sellers.
  - name: price_range
    description: Difference between the maximum and minimum price across competing
      sellers.
  - name: price_rank
    description: Seller's price rank within the product; rank 1 is cheapest.
  - name: delivery_rank
    description: Seller's delivery speed rank within the product; rank 1 is fastest.
  - name: quality_rank
    description: Seller's review score rank within the product; rank 1 is highest
      rated.
