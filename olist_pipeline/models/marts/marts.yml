version: 2

models:
  - name: mart_orders
    description: "Final order-level table with delivery performance metrics. One row per order. Primary table for delivery performance analysis and order status reporting. Delivery status calculated using case/when logic on delivered_at vs estimated_delivery_at timestamps."
    columns:
      - name: order_id
        description: "Unique identifier for each order. Primary key."
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        description: "True unique customer identifier. Use for customer-level aggregations."
      - name: order_status
        description: "Current order status from source system."
      - name: delivery_days
        description: "Days between order placement and delivery. Null for undelivered orders."
      - name: delivery_status
        description: "Derived delivery performance classification. On Time = delivered on or before estimated date. Delayed = delivered after estimated date. Not Delivered = no delivery timestamp recorded."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['On Time', 'Delayed', 'Not Delivered']
      - name: total_payment_amount
        description: "Total amount paid for the order in BRL."

  - name: mart_revenue
    description: "Monthly revenue aggregated by product category. One row per month per category. Revenue rounded to 2 decimal places to avoid floating point precision issues with DOUBLE type. Use revenue_month for time-series analysis and category_name_english for category breakdown."
    columns:
      - name: revenue_month
        description: "First day of the month for this revenue period. Cast to date type for clean sorting and display."
        tests:
          - not_null
      - name: category_name_english
        description: "English product category name. Null for products with no category translation."
      - name: total_item_revenue
        description: "Sum of item prices for this month and category in BRL. Excludes freight."
      - name: total_freight_revenue
        description: "Sum of freight charges for this month and category in BRL."
      - name: total_revenue
        description: "Combined item and freight revenue for this month and category in BRL."
        tests:
          - not_null
      - name: order_count
        description: "Number of distinct orders contributing to this month and category revenue."

  - name: mart_seller_performance
    description: "Seller performance metrics aggregated across all orders. One row per seller. Combines revenue, delivery speed, and customer satisfaction into a single seller scorecard. Average review score is across all orders fulfilled by the seller."
    columns:
      - name: seller_id
        description: "Unique identifier for each seller. Primary key."
        tests:
          - unique
          - not_null
      - name: seller_city
        description: "City where the seller is located."
      - name: seller_state
        description: "State where the seller is located."
      - name: total_orders
        description: "Total number of distinct orders fulfilled by this seller."
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue generated by this seller in BRL including freight."
      - name: avg_delivery_days
        description: "Average number of days to deliver an order. Lower is better."
      - name: avg_review_score
        description: "Average customer review score for this seller. Scale of 1 to 5. Higher is better."