version: 2
models:
- name: int_orders_enriched
  description: Enriched orders model joining customer details and aggregated payment
    data per order.
  columns:
  - name: order_id
    description: Unique identifier for each order in the platform.
    tests:
    - unique
    - not_null
  - name: customer_id
    description: Foreign key linking the order to a specific customer record.
    tests:
    - not_null
  - name: customer_unique_id
    description: Deduplicated identifier representing a unique customer across multiple
      accounts.
  - name: customer_city
    description: City where the customer associated with the order is located.
  - name: customer_state
    description: State where the customer associated with the order is located.
  - name: total_payment_amount
    description: Sum of all payment amounts associated with the order.
    tests:
    - not_null
  - name: payment_count
    description: Total number of payment transactions made for the order.
  - name: delivery_days
    description: Number of days elapsed between order placement and delivery.
- name: int_order_items_enriched
  description: Enriched order items combining product, seller, and category details
    for downstream analysis.
  columns:
  - name: order_id
    description: Unique identifier for the order associated with this line item.
    tests:
    - not_null
  - name: order_item_id
    description: Sequential number identifying each item's position within an order.
  - name: seller_id
    description: Unique identifier for the seller fulfilling this order item.
    tests:
    - not_null
  - name: item_price
    description: Purchase price of the product excluding freight costs.
    tests:
    - not_null
  - name: freight_price
    description: Shipping cost charged for delivering this specific order item.
  - name: total_item_price
    description: Sum of item price and freight price for this order item.
  - name: category_name_english
    description: English translation of the product category name.
  - name: seller_city
    description: City where the seller fulfilling this order item is located.
  - name: seller_state
    description: Brazilian state where the seller fulfilling this order item is located.
