version: 2

models:
  - name: stg_orders
    description: "Cleaned orders data from raw Olist dataset"
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to stg_customers"
        tests:
          - not_null
      - name: order_status
        description: "Current status of the order"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped', 'canceled', 'unavailable', 
                       'invoiced', 'processing', 'created', 'approved']

  - name: stg_customers
    description: "Cleaned customers data from raw Olist dataset"
    columns:
      - name: customer_id
        description: "Unique identifier per order — not per person"
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        description: "True unique identifier per customer across all orders"
        tests:
          - not_null

  - name: stg_order_items
    description: "Cleaned order items data — one row per item per order"
    columns:
      - name: order_id
        description: "Foreign key to stg_orders"
        tests:
          - not_null
      - name: product_id
        description: "Foreign key to stg_products"
        tests:
          - not_null
      - name: seller_id
        description: "Foreign key to stg_sellers"
        tests:
          - not_null
      - name: item_price
        description: "Price of the item in BRL"
        tests:
          - not_null

  - name: stg_order_payments
    description: "Cleaned payments data — one row per payment method per order"
    columns:
      - name: order_id
        description: "Foreign key to stg_orders"
        tests:
          - not_null
      - name: payment_type
        description: "Payment method used"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']
      - name: payment_amount
        description: "Amount paid in BRL"
        tests:
          - not_null

  - name: stg_order_reviews
    description: "Cleaned reviews data from raw Olist dataset"
    columns:
      - name: review_id
        description: "Unique identifier for each review"
        tests:
          - not_null
      - name: order_id
        description: "Foreign key to stg_orders"
        tests:
          - not_null
      - name: review_score
        description: "Customer satisfaction score between 1 and 5"
        tests:
          - not_null
          - accepted_values:
              arguments: 
                values: [1, 2, 3, 4, 5]

  - name: stg_products
    description: "Cleaned products data — upstream column name typos fixed"
    columns:
      - name: product_id
        description: "Unique identifier for each product"
        tests:
          - unique
          - not_null

  - name: stg_sellers
    description: "Cleaned sellers data from raw Olist dataset"
    columns:
      - name: seller_id
        description: "Unique identifier for each seller"
        tests:
          - unique
          - not_null